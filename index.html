<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e4de;
  --text-dim: #8a8580;
  --red: #c43e3e;
  --red-bright: #e85454;
  --blue: #4a7fb5;
  --blue-bright: #6ba3de;
  --gold: #c9a84c;
  --green: #5a9a6a;
  --magenta: #a855a0;
}
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Source Sans 3',sans-serif; }
#app { display:flex; height:100%; position:relative; }

/* --- MAP --- */
#map { flex:1; z-index:1; }
.leaflet-container { background:var(--bg)!important; }
.leaflet-control-zoom { border:1px solid var(--border)!important; }
.leaflet-control-zoom a { background:var(--surface)!important; color:var(--text)!important; border-color:var(--border)!important; }
.leaflet-control-zoom a:hover { background:var(--surface2)!important; }
.leaflet-control-attribution { background:rgba(10,10,10,.85)!important; color:var(--text-dim)!important; font-size:10px!important; }
.leaflet-control-attribution a { color:var(--text-dim)!important; }

/* --- HEADER --- */
#header {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background:linear-gradient(180deg, rgba(10,10,10,.95) 0%, rgba(10,10,10,.7) 80%, transparent 100%);
  padding:12px 16px 24px;
  pointer-events:none;
}
#header > * { pointer-events:auto; }
#header h1 {
  font-family:'Playfair Display',serif; font-weight:900; font-size:20px;
  letter-spacing:-.02em; line-height:1.15;
  background:linear-gradient(135deg, var(--text) 40%, var(--gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#header .sub {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim);
  letter-spacing:.08em; text-transform:uppercase; margin-top:2px;
}

/* --- FILTER BAR --- */
#filters {
  position:absolute; top:70px; left:12px; right:12px; z-index:1000;
  display:flex; gap:6px; flex-wrap:wrap;
}
.filter-btn {
  display:flex; align-items:center; gap:5px;
  padding:6px 10px; border-radius:20px;
  border:1px solid var(--border); background:rgba(20,20,20,.9);
  color:var(--text-dim); font-size:11px; font-family:'JetBrains Mono',monospace;
  cursor:pointer; transition:all .2s; white-space:nowrap;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.filter-btn .dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.filter-btn.active { color:var(--text); border-color:rgba(255,255,255,.25); background:rgba(30,30,30,.95); }
.filter-btn.active .dot { box-shadow:0 0 6px currentColor; }

/* --- ERA TABS --- */
#era-bar {
  position:absolute; bottom:80px; left:12px; right:12px; z-index:1000;
  display:flex; gap:4px; justify-content:center;
}
.era-btn {
  padding:7px 14px; border-radius:18px;
  border:1px solid var(--border); background:rgba(20,20,20,.9);
  color:var(--text-dim); font-size:12px; font-family:'JetBrains Mono',monospace;
  cursor:pointer; transition:all .2s;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.era-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* --- STATS --- */
#stats {
  position:absolute; bottom:44px; left:0; right:0; z-index:1000;
  text-align:center;
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim);
  letter-spacing:.05em; pointer-events:none;
}

/* --- CARD (bottom sheet on mobile) --- */
#card-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.5); z-index:2000;
}
#card-overlay.open { display:block; }
#card {
  position:fixed; bottom:0; left:0; right:0; z-index:2001;
  background:var(--surface); border-top:2px solid var(--border);
  border-radius:16px 16px 0 0;
  max-height:70vh; overflow-y:auto;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,.24,1);
  padding:0 16px 24px;
}
#card.open { transform:translateY(0); }
#card .handle {
  width:36px; height:4px; background:var(--border); border-radius:2px;
  margin:10px auto 14px;
}
#card .card-head {
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  margin-bottom:10px;
}
#card .card-title {
  font-family:'Playfair Display',serif; font-weight:700; font-size:20px;
  line-height:1.2;
}
#card .card-badge {
  flex-shrink:0; padding:3px 8px; border-radius:4px;
  font-family:'JetBrains Mono',monospace; font-size:9px; text-transform:uppercase;
  letter-spacing:.05em; border:1px solid;
}
#card .card-addr {
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
  margin-bottom:8px;
}
#card .card-years {
  display:inline-block; padding:2px 8px; border-radius:3px;
  background:var(--surface2); border:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold);
  margin-bottom:10px;
}
#card .card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
#card .card-tag {
  padding:2px 8px; border-radius:3px; background:var(--surface2);
  font-size:11px; color:var(--text-dim); border:1px solid var(--border);
}
#card .card-text { font-size:14px; line-height:1.55; color:var(--text); }
#card .card-text p { margin-bottom:8px; }
#card .card-status {
  display:flex; align-items:center; gap:6px; margin-top:10px; padding-top:10px;
  border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
}
#card .status-dot { width:8px; height:8px; border-radius:50%; }
#card .card-bands {
  margin-top:10px; padding-top:10px; border-top:1px solid var(--border);
}
#card .card-bands-label {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px;
}
#card .card-bands-list { display:flex; flex-wrap:wrap; gap:4px; }
#card .band-chip {
  padding:3px 8px; border-radius:12px;
  background:rgba(200,168,76,.1); border:1px solid rgba(200,168,76,.25);
  font-size:11px; color:var(--gold);
}
#card .close-btn {
  position:absolute; top:12px; right:16px; width:28px; height:28px;
  border-radius:50%; border:1px solid var(--border); background:var(--surface2);
  color:var(--text-dim); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* --- MARKER STYLES --- */
.marker-icon {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:2px solid; font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:transform .2s;
}
.marker-icon:hover { transform:scale(1.25); }

/* --- DESKTOP --- */
@media (min-width:768px) {
  #header { left:0; right:auto; padding:20px 24px 28px; }
  #header h1 { font-size:26px; }
  #filters { top:85px; left:16px; right:auto; max-width:420px; }
  #era-bar { bottom:24px; left:auto; right:auto; }
  #stats { bottom:8px; }
  #card {
    position:fixed; left:auto; right:16px; bottom:16px; top:auto;
    width:380px; max-height:calc(100vh - 32px);
    border-radius:12px; border:1px solid var(--border);
    transform:translateX(120%);
  }
  #card.open { transform:translateX(0); }
  #card-overlay { display:none!important; }
}
</style>
</head>

// ===== STATE =====
let activeCategories = new Set(Object.keys(CATEGORIES));
let activeEra = 'all';
let markers = [];
let map;

// ===== INIT MAP =====
function initMap() {
  map = L.map('map', {
    center:[59.935, 30.325],
    zoom:13,
    zoomControl:true,
    attributionControl:true,
  });

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains:'abcd',
    maxZoom:19,
  }).addTo(map);

  renderMarkers();
}

// ===== MARKERS =====
function createMarkerIcon(cat) {
  const c = CATEGORIES[cat];
  const div = document.createElement('div');
  div.className = 'marker-icon';
  div.style.width = '18px';
  div.style.height = '18px';
  div.style.backgroundColor = c.color;
  div.style.borderColor = c.color;
  div.style.opacity = '0.9';
  return L.divIcon({
    html: div.outerHTML,
    className:'',
    iconSize:[18,18],
    iconAnchor:[9,9],
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const visible = LOCATIONS.filter(loc => {
    if (!activeCategories.has(loc.cat)) return false;
    if (activeEra !== 'all' && !loc.era.includes(activeEra)) return false;
    return true;
  });

  visible.forEach(loc => {
    const m = L.marker([loc.lat, loc.lng], { icon:createMarkerIcon(loc.cat) })
      .addTo(map)
      .on('click', () => openCard(loc));
    markers.push(m);
  });

  document.getElementById('stats').textContent =
    `${visible.length} из ${LOCATIONS.length} точек на карте`;
}

// ===== CARD =====
function openCard(loc) {
  const c = CATEGORIES[loc.cat];
  const statusColors = {
    active:'var(--green)', preserved:'var(--gold)',
    demolished:'var(--red)', unknown:'var(--text-dim)',
  };
  const statusLabels = {
    active:'Действует', preserved:'Сохранилось',
    demolished:'Утрачено', unknown:'Неизвестно',
  };

  let html = `
    <div class="card-head">
      <div class="card-title">${loc.name}</div>
      <div class="card-badge" style="color:${c.color};border-color:${c.color}">${c.label}</div>
    </div>
    <div class="card-addr">${loc.addr}</div>
    <div class="card-years">${loc.years}</div>
    <div class="card-tags">${loc.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
    <div class="card-text"><p>${loc.text}</p></div>
  `;

  if (loc.bands && loc.bands.length) {
    html += `
      <div class="card-bands">
        <div class="card-bands-label">Связанные артисты</div>
        <div class="card-bands-list">${loc.bands.map(b => `<span class="band-chip">${b}</span>`).join('')}</div>
      </div>
    `;
  }

  html += `
    <div class="card-status">
      <span class="status-dot" style="background:${statusColors[loc.status]||statusColors.unknown}"></span>
      ${loc.statusText || statusLabels[loc.status] || ''}
    </div>
  `;

  document.getElementById('card-content').innerHTML = html;
  document.getElementById('card').classList.add('open');
  document.getElementById('card-overlay').classList.add('open');

  map.flyTo([loc.lat, loc.lng], 15, { duration:.5 });
}

function closeCard() {
  document.getElementById('card').classList.remove('open');
  document.getElementById('card-overlay').classList.remove('open');
}

// ===== FILTERS =====
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeCategories.has(key) ? ' active' : '');
    btn.innerHTML = `<span class="dot" style="background:${cat.dot}"></span>${cat.label}`;
    btn.addEventListener('click', () => {
      if (activeCategories.has(key)) activeCategories.delete(key);
      else activeCategories.add(key);
      renderFilters();
      renderMarkers();
    });
    el.appendChild(btn);
  });
}

function renderEras() {
  const el = document.getElementById('era-bar');
  el.innerHTML = '';
  ERAS.forEach(era => {
    const btn = document.createElement('button');
    btn.className = 'era-btn' + (activeEra === era.id ? ' active' : '');
    btn.textContent = era.label;
    btn.addEventListener('click', () => {
      activeEra = era.id;
      renderEras();
      renderMarkers();
      closeCard();
    });
    el.appendChild(btn);
  });
}

// ===== BOOT =====
initMap();
renderFilters();
renderEras();
</script>
