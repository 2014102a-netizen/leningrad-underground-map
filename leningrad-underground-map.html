<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ленинградский андеграунд — культурная карта 1980–2000-х</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #231f1b;
    --border: rgba(255,255,255,0.08);
    --text: #e8e2d9;
    --text-muted: #8c8479;
    --accent: #e8c84a;
    --accent2: #e05c2a;
    --accent3: #5bb8a0;
    --accent4: #a87ccc;
    --accent5: #e05c2a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

  /* HEADER */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(180deg, rgba(14,12,10,0.98) 0%, rgba(14,12,10,0.85) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex; align-items: center; gap: 20px;
  }
  #header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    background: linear-gradient(90deg, var(--accent), #fff8dc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  #header .subtitle { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  #header .spacer { flex: 1; }

  /* DECADE FILTER */
  .decade-filters { display: flex; gap: 6px; }
  .decade-btn {
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-size: 11px; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .decade-btn.active, .decade-btn:hover { background: var(--accent); color: #0e0c0a; border-color: var(--accent); font-weight: 600; }

  /* SIDEBAR */
  #sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0; width: 280px; z-index: 900;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500;
  }
  /* LAYER TOGGLES */
  .layer-toggles { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .layer-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 5px 8px; border-radius: 6px; transition: background 0.15s;
  }
  .layer-toggle:hover { background: rgba(255,255,255,0.04); }
  .layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .layer-label { font-size: 12px; color: var(--text); flex: 1; }
  .layer-count { font-size: 10px; color: var(--text-muted); }
  .layer-checkbox { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }

  /* LOCATION LIST */
  #location-list { flex: 1; overflow-y: auto; }
  #location-list::-webkit-scrollbar { width: 4px; }
  #location-list::-webkit-scrollbar-track { background: transparent; }
  #location-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .loc-item {
    padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .loc-item:hover, .loc-item.active { background: rgba(232,200,74,0.07); }
  .loc-item-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .loc-item-info { flex: 1; min-width: 0; }
  .loc-item-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .loc-item-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .loc-item.hidden { display: none; }

  /* MAP */
  #map {
    position: fixed; top: 56px; left: 280px; right: 0; bottom: 0; z-index: 1;
  }

  /* POPUP OVERRIDE */
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    border: 1px solid rgba(232,200,74,0.3) !important;
    border-radius: 12px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
    max-width: 320px;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-close-button { color: var(--text-muted) !important; font-size: 18px !important; top: 10px !important; right: 12px !important; }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }

  .popup-inner { padding: 16px; }
  .popup-layer-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px; padding: 2px 8px; border-radius: 20px;
  }
  .popup-title { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .popup-address { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .popup-years { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  .popup-desc { font-size: 12px; color: rgba(232,226,217,0.8); line-height: 1.6; margin-bottom: 12px; }
  .popup-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .popup-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border);
  }
  .popup-bands { font-size: 11px; color: var(--text-muted); }
  .popup-bands strong { color: var(--text); }
  .popup-status { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; margin-top: 10px; padding: 3px 8px; border-radius: 4px; }
  .status-active { background: rgba(91,184,160,0.15); color: var(--accent3); }
  .status-lost { background: rgba(224,92,42,0.12); color: var(--accent2); }
  .status-changed { background: rgba(168,124,204,0.12); color: var(--accent4); }

  /* CUSTOM MARKER */
  .custom-marker {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .custom-marker:hover { transform: scale(1.2); box-shadow: 0 4px 16px rgba(0,0,0,0.7); }

  /* INFO PANEL bottom */
  #info-bar {
    position: fixed; bottom: 16px; right: 16px; z-index: 900;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-size: 11px; color: var(--text-muted);
    display: flex; gap: 16px; align-items: center;
    backdrop-filter: blur(8px);
  }
  #info-bar span { display: flex; align-items: center; gap: 5px; }
  #info-bar .dot { width: 7px; height: 7px; border-radius: 50%; }

  /* TIMELINE SLIDER */
  #timeline-wrap {
    position: fixed; bottom: 16px; left: 296px; right: 160px; z-index: 900;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 16px;
    backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 12px;
  }
  #timeline-wrap label { font-size: 10px; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
  #year-range { flex: 1; accent-color: var(--accent); cursor: pointer; }
  #year-display { font-size: 11px; color: var(--accent); font-weight: 600; min-width: 36px; text-align: right; }

  /* SEARCH */
  #search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  #search-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; color: var(--text); font-size: 12px; font-family: 'Inter', sans-serif;
    outline: none;
  }
  #search-input:focus { border-color: rgba(232,200,74,0.4); }
  #search-input::placeholder { color: var(--text-muted); }

  /* Leaflet dark tiles override */
  .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(5deg); }
  .leaflet-control-zoom a { background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>Ленинградский андеграунд</h1>
    <div class="subtitle">Культурная география музыкальной сцены · 1980–2000-е</div>
  </div>
  <div class="spacer"></div>
  <div class="decade-filters">

    <button class="decade-btn" data-decade="90" onclick="filterDecade('90',this)">1990-е</button>
    <button class="decade-btn" data-decade="00" onclick="filterDecade('00',this)">2000-е</button>
  </div>
</div>

<div id="sidebar">

  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Поиск по названию, адресу, группе…" oninput="filterSearch(this.value)">
  </div>
  <div class="layer-toggles">
    <label class="layer-toggle">
      <input type="checkbox" class="layer-checkbox" checked onchange="toggleLayer('rock', this)">
      <span class="layer-dot" style="background:#e8c84a"></span>
      <span class="layer-label">Рок-андеграунд 80-х</span>
      <span class="layer-count" id="count-rock"></span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" class="layer-checkbox" checked onchange="toggleLayer('club', this)">
      <span class="layer-dot" style="background:#5bb8a0"></span>
      <span class="layer-label">Клубная инфраструктура 90-х</span>
      <span class="layer-count" id="count-club"></span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" class="layer-checkbox" checked onchange="toggleLayer('institution', this)">
      <span class="layer-dot" style="background:#a87ccc"></span>
      <span class="layer-label">Институции</span>
      <span class="layer-count" id="count-institution"></span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" class="layer-checkbox" checked onchange="toggleLayer('address', this)">
      <span class="layer-dot" style="background:#e05c2a"></span>
      <span class="layer-label">Адреса музыкантов</span>
      <span class="layer-count" id="count-address"></span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" class="layer-checkbox" checked onchange="toggleLayer('gather', this)">
      <span class="layer-dot" style="background:#7faee8"></span>
      <span class="layer-label">Точки сбора / дистрибуция</span>
      <span class="layer-count" id="count-gather"></span>
    </label>
  </div>
  <div id="location-list"></div>
</div>

<div id="map"></div>

<div id="timeline-wrap">
  <label>Временной слой</label>
  <input type="range" id="year-range" min="1980" max="2010" value="2010" step="1" oninput="filterYear(this.value)">
  <span id="year-display">2010</span>
</div>

<div id="info-bar">

    years: [1993, 2010], decade: ['90','00'],
    status: 'active',
    desc: 'Money Honey — один из первых настоящих рок-клубов постсоветского Петербурга. Рок-н-ролл, рокабилли, гараж. Место встречи нескольких поколений независимой сцены.',
    tags: ['клуб', 'рок-н-ролл', 'рокабилли'],
    bands: [],
    veracity: 'Документально подтверждено'
  },
];

// State
let activeDecade = 'all';
let activeYear = 2010;
let hiddenLayers = new Set();
let searchQuery = '';
let markers = {};
let activeMarkerId = null;

// Init map
const map = L.map('map', {
  center: [59.935, 30.32],
  zoom: 13,
  zoomControl: true,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap, &copy; CARTO',
  maxZoom: 19
}).addTo(map);

L.control.attribution({ position: 'bottomright', prefix: '© OpenStreetMap · CARTO · Ленинградский андеграунд' }).addTo(map);

function createMarkerIcon(loc) {
  const layer = LAYERS[loc.layer];
  const div = document.createElement('div');
  div.className = 'custom-marker';
  div.style.background = layer.color + '22';
  div.style.borderColor = layer.color + '66';
  div.innerHTML = layer.emoji;
  return L.divIcon({ html: div.outerHTML, className: '', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16] });
}

function statusBadge(status) {
  const map2 = {
    active: ['status-active', '● Действует'],
    lost: ['status-lost', '✕ Утрачено'],
    changed: ['status-changed', '~ Изменено'],
  };
  const [cls, label] = map2[status] || ['', status];
  return `<span class="popup-status ${cls}">${label}</span>`;
}

function buildPopup(loc) {
  const layer = LAYERS[loc.layer];
  const yStr = loc.years[0] + (loc.years[1] ? '–' + loc.years[1] : '–наст. вр.');
  const bands = loc.bands.length ? `<div class="popup-bands"><strong>Связанные артисты:</strong> ${loc.bands.join(', ')}</div>` : '';
  const tags = loc.tags.map(t => `<span class="popup-tag">${t}</span>`).join('');
  return `<div class="popup-inner">
    <div class="popup-layer-tag" style="background:${layer.color}22;color:${layer.color}">${layer.emoji} ${layer.label}</div>
    <div class="popup-title">${loc.name}</div>
    <div class="popup-address">📍 ${loc.address}</div>
    <div class="popup-years">⏱ ${yStr}</div>
    <div class="popup-desc">${loc.desc}</div>
    <div class="popup-tags">${tags}</div>
    ${bands}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      ${statusBadge(loc.status)}
      <span style="font-size:10px;color:var(--text-muted)">${loc.veracity}</span>
    </div>
  </div>`;
}

function isVisible(loc) {
  if (hiddenLayers.has(loc.layer)) return false;
  if (activeDecade !== 'all' && !loc.decade.includes(activeDecade)) return false;
  if (loc.years[0] > activeYear) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const searchStr = [loc.name, loc.address, ...loc.bands, ...loc.tags].join(' ').toLowerCase();
    if (!searchStr.includes(q)) return false;
  }
  return true;
}

function rebuildMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  LOCATIONS.forEach(loc => {
    if (!isVisible(loc)) return;
    const marker = L.marker([loc.lat, loc.lng], { icon: createMarkerIcon(loc) });
    marker.bindPopup(buildPopup(loc), { maxWidth: 320, className: '' });
    marker.on('click', () => {
      highlightListItem(loc.id);
      activeMarkerId = loc.id;
    });
    marker.addTo(map);
    markers[loc.id] = marker;
  });
  rebuildList();
  updateCounts();
}

function rebuildList() {
  const list = document.getElementById('location-list');
  list.innerHTML = '';
  LOCATIONS.forEach(loc => {
    const visible = isVisible(loc);
    const layer = LAYERS[loc.layer];
    const yStr = loc.years[0] + (loc.years[1] ? '–' + loc.years[1] : '–н.в.');
    const el = document.createElement('div');
    el.className = 'loc-item' + (visible ? '' : ' hidden');
    el.id = 'list-item-' + loc.id;
    el.innerHTML = `<span class="loc-item-dot" style="background:${layer.color}"></span>
      <div class="loc-item-info">
        <div class="loc-item-name">${loc.name}</div>
        <div class="loc-item-meta">${loc.address} · ${yStr}</div>
      </div>`;
    el.onclick = () => {
      if (markers[loc.id]) {
        map.setView([loc.lat, loc.lng], 15, { animate: true });
        markers[loc.id].openPopup();
        highlightListItem(loc.id);
      }
    };
    list.appendChild(el);
  });
}

function highlightListItem(id) {
  document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('list-item-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function updateCounts() {
  ['rock','club','institution','address','gather'].forEach(layer => {
    const count = LOCATIONS.filter(l => l.layer === layer && isVisible(l)).length;
    const total = LOCATIONS.filter(l => l.layer === layer).length;
    document.getElementById('count-' + layer).textContent = count + '/' + total;
  });
}

function filterDecade(decade, btn) {
  activeDecade = decade;
  document.querySelectorAll('.decade-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rebuildMarkers();
}

function filterYear(val) {
  activeYear = parseInt(val);
  document.getElementById('year-display').textContent = val;
  rebuildMarkers();
}

function toggleLayer(layer, cb) {
  if (cb.checked) hiddenLayers.delete(layer);
  else hiddenLayers.add(layer);
  rebuildMarkers();
}

function filterSearch(q) {
  searchQuery = q;
  rebuildMarkers();
}

rebuildMarkers();
</script>
</body>
</html>
